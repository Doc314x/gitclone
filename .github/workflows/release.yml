name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build (net48 + Costura -> single exe)
        run: dotnet build src/GitClone -c Release

      - name: Create GitHub Release with single exe
        uses: softprops/action-gh-release@v2
        with:
          files: src/GitClone/bin/Release/net48/GitClone.exe
          generate_release_notes: true
