name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build (net48, uses in-box .NET Framework runtime)
        run: dotnet build src/GitClone -c Release

      - name: Zip exe + dlls
        shell: pwsh
        run: Compress-Archive -Path src/GitClone/bin/Release/net48/* -DestinationPath GitClone-net48.zip

      - name: Create GitHub Release with zip
        uses: softprops/action-gh-release@v2
        with:
          files: GitClone-net48.zip
          generate_release_notes: true
